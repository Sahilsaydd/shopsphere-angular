<div class="container my-5">

  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h3 class="fw-bold">Curated Realms</h3>
      <small class="text-muted">Explore by category</small>
    </div>

    <a routerLink="/shop" class="text-primary text-decoration-none fw-semibold">
      All categories →
    </a>
  </div>

  <!-- Categories -->
  <div *ngIf="!loading; else loadingTpl">
    <div class="row g-4">

      <ng-container *ngFor="let category of categories; index as i">

        <!-- LARGE -->
        <div *ngIf="i === 0" class="col-lg-6">
          <div
            class="category-card large"
            [ngStyle]="{ 'background-image': 'url(' + category.image + ')' }"
            (click)="goToCategory(category.name)"
          >
            <div class="overlay">
              <h4>{{ category.name }}</h4>
              <p>{{ category.desc }}</p>
            </div>
          </div>
        </div>

        <!-- MEDIUM -->
        <div *ngIf="i === 1" class="col-6">
          <div
            class="category-card medium"
            [ngStyle]="{ 'background-image': 'url(' + category.image + ')' }"
            (click)="goToCategory(category.name)"
          >
            <div class="overlay">
              <h5>{{ category.name }}</h5>
            </div>
          </div>
        </div>

        <!-- SMALL -->
        <div *ngIf="i === 2 || i === 3" class="col-6">
          <div
            class="category-card small"
            [ngStyle]="{ 'background-image': 'url(' + category.image + ')' }"
            (click)="goToCategory(category.name)"
          >
            <div class="overlay">
              <h6>{{ category.name }}</h6>
            </div>
          </div>
        </div>

      </ng-container>

    </div>
  </div>

  <!-- Loading -->
<ng-template #loadingTpl>
  <div class="text-center py-5">
    <div class="spinner-border text-primary"></div>
    <p class="mt-3">Loading categories...</p>
  </div>
</ng-template>
</div>
