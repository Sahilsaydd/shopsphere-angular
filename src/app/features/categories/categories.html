<div class="container my-5">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h3 class="fw-bold">Curated Realms</h3>
      <small class="text-muted">Explore by category</small>
    </div>

    <a routerLink="/shop" class="text-primary text-decoration-none fw-semibold">
      All categories →
    </a>
  </div>

  <div *ngIf="categories.length >= 4; else loading" class="row g-4">

    <!-- LEFT BIG CARD -->
    <div class="col-lg-6" *ngIf="categories[0]">
      <div 
        class="category-card large"
        [style.background-image]="'url(' + categories[0].image + ')'"
      >
        <div class="overlay">
          <h4>{{ categories[0].name }}</h4>
          <p>{{ categories[0].desc }}</p>
        </div>
      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="col-lg-6">
      <div class="row g-4">

        <div class="col-12">
          <div 
            class="category-card medium"
            [style.background-image]="'url(' + categories[1].image + ')'"
          >
            <div class="overlay">
              <h5>{{ categories[1].name }}</h5>
            </div>
          </div>
        </div>

        <div class="col-6">
          <div 
            class="category-card small"
            [style.background-image]="'url(' + categories[2].image + ')'"
          >
            <div class="overlay">
              <h6>{{ categories[2].name }}</h6>
            </div>
          </div>
        </div>

        <div class="col-6">
          <div 
            class="category-card small"
            [style.background-image]="'url(' + categories[3].image + ')'"
          >
            <div class="overlay">
              <h6>{{ categories[3].name }}</h6>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>

  <ng-template #loading>
    <div class="text-center py-5">
      Loading categories...
    </div>
  </ng-template>
</div>
