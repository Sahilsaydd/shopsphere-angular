<div class="container my-5">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h3 class="fw-bold">Curated Realms</h3>
      <small class="text-muted">Explore by category</small>
    </div>

    <a routerLink="/shop" class="text-primary text-decoration-none fw-semibold">
      All categories →
    </a>
  </div>

  <div *ngIf="categories.length > 0; else loading">
    <div class="mb-4">
      <span class="badge bg-light text-dark me-2" *ngFor="let category of categories">
        {{ category.name }}
      </span>
    </div>

    <div class="row g-4">
      <ng-container *ngFor="let category of categories; index as i">
        <div *ngIf="i === 0" class="col-lg-6">
          <div
            class="category-card large"
            [ngStyle]="{ 'background-image': 'url(' + category.image + ')' }"
          >
            <div class="overlay">
              <h4>{{ category.name }}</h4>
              <p>{{ category.desc }}</p>
            </div>
          </div>
        </div>

        <div *ngIf="i === 1" class="col-12">
          <div
            class="category-card medium"
            [ngStyle]="{ 'background-image': 'url(' + category.image + ')' }"
          >
            <div class="overlay">
              <h5>{{ category.name }}</h5>
            </div>
          </div>
        </div>

        <div *ngIf="i === 2 || i === 3" class="col-6">
          <div
            class="category-card small"
            [ngStyle]="{ 'background-image': 'url(' + category.image + ')' }"
          >
            <div class="overlay">
              <h6>{{ category.name }}</h6>
            </div>
          </div>
        </div>
      </ng-container>
    </div>
  </div>

  <ng-template #loading>
    <div class="text-center py-5">
      Loading categories...
    </div>
  </ng-template>
</div>
