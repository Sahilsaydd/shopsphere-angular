<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">

      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-4">

          <h4 class="fw-bold mb-4 text-center">
            <i class="fas fa-box-open me-2 text-primary"></i>
            Add New Product
          </h4>

          <form (ngSubmit)="openConfirmModal()" #productForm="ngForm">

            <div class="mb-3">
              <label class="form-label fw-semibold" for="product-name">
                <i class="fas fa-tag me-1 text-primary"></i> Product Name
              </label>
              <input id="product-name" type="text" class="form-control" name="name"
                [(ngModel)]="product.name"
                placeholder="Enter product name" required>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold" for="product-description">
                <i class="fas fa-align-left me-1 text-primary"></i> Description
              </label>
              <textarea id="product-description" class="form-control" rows="3"
                name="description"
                [(ngModel)]="product.description"
                placeholder="Enter description" required>
              </textarea>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold" for="product-price">
                  <i class="fas fa-rupee-sign me-1 text-success"></i> Price
                </label>
                <input id="product-price" type="number" class="form-control"
                  name="price"
                  [(ngModel)]="product.price"
                  placeholder="Enter price" required>
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold" for="product-category">
                  <i class="fas fa-layer-group me-1 text-info"></i> Category
                </label>
                <input id="product-category" type="text" class="form-control"
                  name="category"
                  [(ngModel)]="product.category"
                  placeholder="Enter category" required>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold" for="product-stock">
                  <i class="fas fa-boxes me-1 text-warning"></i> Stock
                </label>
                <input id="product-stock" type="number" class="form-control"
                  name="stock"
                  [(ngModel)]="product.stock"
                  placeholder="Available stock" required>
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold" for="product-brand">
                  <i class="fas fa-industry me-1 text-secondary"></i> Brand
                </label>
                <input id="product-brand" type="text" class="form-control"
                  name="brand"
                  [(ngModel)]="product.brand"
                  placeholder="Brand name" required>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label" for="product-rating">
                  <i class="fas fa-star text-warning me-2"></i>
                  Rating
                </label>
                <input id="product-rating" type="number"
                  name="rating"
                  class="form-control"
                  [(ngModel)]="product.rating"
                  placeholder="0 - 5"
                  min="0" max="5" step="0.1">
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold" for="product-discount">
                  <i class="fas fa-percent me-1 text-danger"></i> Discount (%)
                </label>
                <input id="product-discount" type="number"
                  class="form-control"
                  name="discount_percentage"
                  [(ngModel)]="product.discount_percentage"
                  placeholder="Enter discount">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold" for="product-main-image">
                <i class="fas fa-image me-1 text-primary"></i> Main Image
              </label>
              <input id="product-main-image" type="file"
                class="form-control"
                aria-label="Upload main product image"
                (change)="onFileSelect($event)">
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold" for="product-gallery-images">
                <i class="fas fa-images me-1 text-primary"></i> Gallery Images
              </label>
              <input id="product-gallery-images" type="file"
                class="form-control"
                multiple
                aria-label="Upload gallery images"
                (change)="onMultipleSelect($event)">
            </div>

            <div class="d-grid mt-4">
              <button class="btn btn-primary btn-lg rounded-3"
                type="submit"
                [disabled]="productForm.invalid">
                <i class="fas fa-plus-circle me-2"></i>
                Create Product
              </button>
            </div>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>

<div class="modal fade" id="confirmModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4 shadow">

      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold">
          <i class="fas fa-box-open text-primary me-2"></i>
          Confirm Product Creation
        </h5>
        <button type="button" class="btn-close" aria-label="Close confirmation modal" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body text-center py-4">
        <i class="fas fa-exclamation-triangle text-warning fs-1 mb-3"></i>

        <p class="fw-semibold mb-1">
          Are you sure you want to create this product?
        </p>

        <small class="text-muted">
          This action will save the product to database.
        </small>
      </div>

      <div class="modal-footer border-0 justify-content-center gap-3">

        <button class="btn btn-outline-secondary px-4 rounded-3"
          data-bs-dismiss="modal">
          <i class="fas fa-times me-2"></i>
          Cancel
        </button>

        <button class="btn btn-primary px-4 rounded-3"
          data-bs-dismiss="modal"
          (click)="confirmCreate()">
          <i class="fas fa-check me-2"></i>
          Yes, Create
        </button>

      </div>

    </div>
  </div>
</div>
