<div class="navbar-container px-3 px-md-4 py-2 w-100 d-flex align-items-center justify-content-between">

  <div class="fw-bold mb-0 text-truncate"><a
  routerLink="/admin"
  routerLinkActive="active"
  [routerLinkActiveOptions]="{ exact: true }"
>
  Dashboard
</a></div>

  <div class="d-flex align-items-center gap-3">

    <div class="icon-wrapper">
      <i class="fas fa-bell icon"></i>
      <span class="notification-dot"></span>
    </div>

    <div class="dropdown">

      <div
        class="profile d-flex align-items-center gap-2 dropdown-toggle"
        role="button"
        data-bs-toggle="dropdown"
        aria-expanded="false"
      >
        <div class="avatar">SA</div>
        <span class="fw-semibold d-none d-md-inline">Admin</span>
      </div>

      <ul class="dropdown-menu dropdown-menu-end custom-dropdown shadow-lg border-0">

        <li>
          <a   routerLink="/admin/profile" routerLinkActive="active" class="dropdown-item d-flex align-items-center gap-2"  >
            <i class="fas fa-user text-primary"></i>
            <span>Profile</span>
          </a>
        </li>

        <li><hr class="dropdown-divider"></li>

        <li>
          <button (click)="logout()"  class="dropdown-item d-flex align-items-center gap-2 text-danger">
            <i class="fas fa-sign-out-alt"></i>
            <span  >Logout</span>
          </button>
        </li>

      </ul>
    </div>

  </div>
</div>
