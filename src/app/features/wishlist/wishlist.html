<div class="container my-5">
  <h3 class="fw-bold mb-4">Your Wishlist</h3>

  <div *ngIf="wishlistItems.length === 0" class="text-center text-muted">
    <p>No items in your wishlist.</p>
  </div>

  <div *ngFor="let item of wishlistItems; let i = index" class="card border-0 shadow-sm rounded-4 p-3 mb-3">
    <div class="d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center gap-3">
        <img [src]="resolveImage(item.image || item.product_img)" width="60" alt="" class="rounded">

        <div>
          <h6 class="fw-semibold mb-1">{{ item.name }}</h6>
          <small class="text-muted">Rs. {{ item.price }}</small>
        </div>
      </div>

      <i class="fa fa-trash text-danger" style="cursor: pointer;" (click)="openRemoveConfirm(i)"></i>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade show d-block" *ngIf="showModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4 shadow">
      <div class="modal-header">
        <h5 class="modal-title">Remove Item</h5>
        <button type="button" class="btn-close" (click)="closeModal()"></button>
      </div>

      <div class="modal-body">
        Are you sure you want to remove this item?
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="closeModal()">Cancel</button>
        <button class="btn btn-danger" (click)="confirmRemove()">Remove</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-backdrop fade show" *ngIf="showModal"></div>
